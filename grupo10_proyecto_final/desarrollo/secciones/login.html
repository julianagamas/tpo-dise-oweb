<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/estilos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <link rel="icon" href="../assets/img/logo.avif">
    <title>Login - UADE Pickup</title>
</head>
<body>
    <main class="vh-100 d-flex align-items-center justify-content-center p-sm-3" id="bg-login">
        <div class="container-fluid">
            <div class="row justify-content-center w-100 m-0">
                <div class="col-12 col-sm-8">
                    <div class="bg-white p-3 p-sm-5 rounded-4">

                        <h1 class="font-light text-center">Bienvenido/a a <span class="font-bold">UADE Pickup</span></h1>
                        <p class="text-center">Inicia sesión con tu usuario UADE para continuar</p>

                        <form id="formLogin" novalidate>

                            <div class="mb-3">
                                <label for="email" class="form-label m-0">Mail institucional</label>
                                <input type="email" class="form-control" id="email">
                                <div class="invalid-feedback">Ingresá un correo valido.</div>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label m-0">Contraseña</label>
                                <input type="password" class="form-control" id="password">
                                <div class="invalid-feedback">La contraseña es incorrecta.</div>
                            </div>
                            
                            <div id="avisoExito" class="alert alert-success d-none text-center py-2 mb-3" role="alert">
                                Inicio de sesión exitoso
                            </div>
                            <button type="submit" class="btn bg-darkblue text-white mt-1 px-4">Ingresar</button>
                        </form>

                    </div>

                </div>
            </div>
        </div>
    </main>
    <script src="../assets/script.js"></script>
</body>
</html>
